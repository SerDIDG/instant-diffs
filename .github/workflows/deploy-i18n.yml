name: Deploy i18n

on:
  # Automatic i18n deploy: when translatewiki pushes localisation updates to i18n/.
  push:
    branches: [ main ]
    paths:
      - 'i18n/**'

  # Manual i18n deploy: choose the project config.
  workflow_dispatch:
    inputs:
      project:
        description: Project config key from env.json (PROJECT), e.g. mediawiki or testwiki
        type: string
        required: true
        default: mediawiki

# Share the deploy group so i18n and full deploys never run at the same time.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy-i18n:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Create env.json
        run: printf '%s' "$ENV_JSON" > env.json
        env:
          ENV_JSON: ${{ secrets.ENV_JSON }}

      - name: Install dependencies
        run: npm ci

      # On push: deploy i18n to mediawiki. On manual: the chosen project.
      - name: Deploy i18n
        run: npm run deploy-i18n
        env:
          PROJECT: ${{ inputs.project || 'mediawiki' }}
